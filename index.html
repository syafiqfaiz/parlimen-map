<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malaysia Parliament Seats — 4 Elections</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #map { width: 100vw; height: 100vh; }
  #controls {
    position: absolute; top: 10px; left: 60px; z-index: 1000;
    background: white; padding: 8px 14px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-size: 14px; max-width: 90vw;
  }
  #controls label { font-weight: 600; color: #333; }
  #controls select {
    padding: 5px 10px; border-radius: 6px; border: 1px solid #ccc;
    font-size: 14px; cursor: pointer;
  }
  #controls select:focus { outline: 2px solid #4a90d9; border-color: transparent; }
  #stats { color: #666; font-size: 13px; border-left: 1px solid #ddd; padding-left: 10px; }
  #source-anno {
    font-size: 11px; color: #999; margin-left: 8px;
    border-left: 1px solid #ddd; padding-left: 10px;
  }
  #source-anno .primary { color: #27AE60; font-weight: 600; }
  #source-anno .secondary { color: #E67E22; font-weight: 600; }
  .legend {
    background: white; padding: 10px 14px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    font-size: 13px; line-height: 1.6;
    max-height: 70vh; overflow-y: auto;
  }
  .legend-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-color {
    width: 14px; height: 14px; border-radius: 3px; display: inline-block;
    border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0;
  }
  .popup-content { font-size: 13px; line-height: 1.5; min-width: 240px; }
  .popup-content h3 { font-size: 15px; margin-bottom: 2px; }
  .popup-content .code { color: #888; font-size: 12px; margin-bottom: 4px; }
  .popup-content .row { display: flex; justify-content: space-between; padding: 2px 0; gap: 8px; }
  .popup-content .label { color: #666; white-space: nowrap; }
  .popup-content .value { font-weight: 600; text-align: right; }
  .popup-content hr { border: none; border-top: 1px solid #eee; margin: 5px 0; }
  .party-tag {
    display: inline-block; padding: 1px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; color: white; margin-right: 4px;
  }
  .source-badge {
    display: inline-block; font-size: 9px; padding: 0 5px;
    border-radius: 3px; font-weight: 600; margin-left: 4px;
  }
  .source-primary { background: #E8F8F5; color: #1E8449; }
  .source-secondary { background: #FEF5E7; color: #B7950B; }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 2000; background: white; padding: 20px 30px;
    border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    font-size: 16px; color: #555;
  }
</style>
</head>
<body>
<div id="loading">Loading map data...</div>
<div id="map"></div>
<div id="controls">
  <label for="electionToggle">🗳️ Election:</label>
  <select id="electionToggle">
    <option value="2022">GE15 (2022)</option>
    <option value="2018">GE14 (2018)</option>
    <option value="2013">GE13 (2013)</option>
    <option value="2008">GE12 (2008)</option>
  </select>
  <span id="stats">222 seats</span>
  <span id="source-anno"></span>
</div>

<script>
const ELECTION = {
  '2008': { mp: 'mp_2008', party: 'party_2008', majority: 'majority_2008', turnout: 'turnout_2008', electors: 'electors_2008', source: 'source_2008', label: 'GE12 (2008)' },
  '2013': { mp: 'mp_2013', party: 'party_2013', majority: 'majority_2013', turnout: 'turnout_2013', electors: 'electors_2013', source: 'source_2013', label: 'GE13 (2013)' },
  '2018': { mp: 'mp_2018', party: 'party_2018', majority: 'majority_2018', turnout: 'turnout_2018', electors: 'electors_2018', source: 'source_2018', label: 'GE14 (2018)' },
  '2022': { mp: 'mp_2022', party: 'party_2022', majority: 'majority_2022', turnout: 'turnout_2022', electors: 'electors_2022', source: 'source_2022', label: 'GE15 (2022)' },
};

const PARTY_COLORS = {"PH-DAP": "#CC0000", "PH-PKR": "#E32636", "PH-AMANAH": "#DC3545", "PH-UPKO": "#E6735C", "PH-PPBM": "#F08080", "BN-UMNO": "#1A5276", "BN-MCA": "#2E86C1", "BN-MIC": "#3498DB", "BN-PBB": "#2980B9", "BN-PDP": "#5DADE2", "BN-PRS": "#85C1E9", "BN-SUPP": "#AED6F1", "BN-PBS": "#2471A3", "BN-PBRS": "#154360", "BN-UPKO": "#1B4F72", "BN-Gerakan": "#5499C7", "BN-LDP": "#7FB3D8", "BN-SPDP": "#A9CCE3", "BN-SAPP": "#D4E6F1", "PN-PAS": "#1B7A2B", "PN-BERSATU": "#229954", "PN-GERAKAN": "#52BE80", "GPS-PBB": "#0E6655", "GPS-PDP": "#148F77", "GPS-PRS": "#1ABC9C", "GPS-SUPP": "#48C9B0", "GRS-BERSATU Sabah": "#0B5345", "GRS-PBS": "#117A65", "GRS-STAR": "#196F3D", "WARISAN": "#E67E22", "GTA-PEJUANG": "#6C3483", "MUDA": "#7D3C98", "PBM": "#A569BD", "IND": "#808080", "GS-PAS": "#1B7A2B", "USA-STAR": "#7B7D7D", "STAR": "#7B7D7D", "HR": "#B9770E", "BN": "#2874A6", "PR-PKR": "#E32636", "PR-DAP": "#CC0000", "PR-PAS": "#239B56", "PR-PS": "#A569BD"};

function getColor(p) { return PARTY_COLORS[p] || '#999'; }

function darken(c, a) {
  const n = parseInt(c.slice(1), 16);
  const r = Math.max(0, (n >> 16) - a), g = Math.max(0, ((n >> 8) & 0xff) - a), b = Math.max(0, (n & 0xff) - a);
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

const map = L.map('map', { zoomControl: true }).setView([3.8, 109.5], 5.5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> | <a href="https://www.dosm.gov.my" target="_blank">DOSM</a> | <a href="https://www.data.gov.my" target="_blank">data.gov.my</a>',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

let currentYear = '2022', geoLayer = null, legendCtrl = null;

function updateLegend(year) {
  if (!PARLIMEN_GEOJSON) return '<div>...</div>';
  const seen = new Set();
  PARLIMEN_GEOJSON.features.forEach(f => { const p = f.properties[ELECTION[year].party]; if (p) seen.add(p); });
  const groups = {};
  seen.forEach(p => { const g = p.includes('-') ? p.split('-')[0] : p; if (!groups[g]) groups[g] = []; groups[g].push(p); });
  const order = ['PH','PR','PN','BN','GPS','GRS','WARISAN','GTA','GS','MUDA','PBM','IND','HR','USA'];
  const sorted = Object.entries(groups).sort((a,b) => (order.indexOf(a[0])<0?99:order.indexOf(a[0])) - (order.indexOf(b[0])<0?99:order.indexOf(b[0])));
  let html = '<div class="legend-title">🗳️ ' + ELECTION[year].label + '</div>';
  for (const [coal, parties] of sorted) {
    html += '<div class="legend-item"><span class="legend-color" style="background:'+getColor(parties[0])+'"></span> <b>'+coal+'</b></div>';
    parties.sort().forEach(p => {
      html += '<div class="legend-item" style="padding-left:18px"><span class="legend-color" style="background:'+getColor(p)+';opacity:0.65"></span> '+p+'</div>';
    });
  }
  return html;
}

function mkStyle(year) {
  return function(f) {
    const p = f.properties[ELECTION[year].party] || 'IND';
    return { fillColor: getColor(p), weight: 1.2, opacity: 0.8, color: darken(getColor(p), 40), fillOpacity: 0.7 };
  };
}

function highlight(e) {
  e.target.setStyle({ weight: 3, color: '#333', fillOpacity: 0.9 }).bringToFront();
}
function unhighlight(e) {
  const f = e.target.feature;
  const p = f.properties[ELECTION[currentYear].party] || 'IND';
  e.target.setStyle({ fillColor: getColor(p), weight: 1.2, opacity: 0.8, color: darken(getColor(p), 40), fillOpacity: 0.7 });
}

function popupHTML(props) {
  const c = (p) => p ? 'style="background:'+getColor(p)+'"' : '';
  const s = (yr) => {
    const src = props['source_'+yr] || '';
    if (src.includes('Primary')) return '<span class="source-badge source-primary">PRIMARY</span>';
    return '<span class="source-badge source-secondary">SECONDARY</span>';
  };
  return '<div class="popup-content">'
    + '<h3>'+props.parlimen+'</h3>'
    + '<div class="code">'+props.code_parlimen+' · '+props.state+'</div>'
    + '<div style="margin:3px 0;color:#666">'+(props.main_town||'—')+'</div><hr>'
    + '<div class="row"><span class="label">GE12 (\'08)</span><span class="value"><span class="party-tag" '+c(props.party_2008)+'>'+(props.party_2008||'—')+'</span>'+(props.mp_2008||'—')+' '+s('2008')+'</span></div>'
    + '<div class="row"><span class="label">GE13 (\'13)</span><span class="value"><span class="party-tag" '+c(props.party_2013)+'>'+(props.party_2013||'—')+'</span>'+(props.mp_2013||'—')+' '+s('2013')+'</span></div>'
    + '<div class="row"><span class="label">GE14 (\'18)</span><span class="value"><span class="party-tag" '+c(props.party_2018)+'>'+(props.party_2018||'—')+'</span>'+(props.mp_2018||'—')+' '+s('2018')+'</span></div>'
    + '<div class="row"><span class="label">GE15 (\'22)</span><span class="value"><span class="party-tag" '+c(props.party_2022)+'>'+(props.party_2022||'—')+'</span>'+(props.mp_2022||'—')+' '+s('2022')+'</span></div><hr>'
    + '<div class="row"><span class="label">Voters</span><span class="value">'+(props.electors_2022||'—')+'</span></div>'
    + '<div class="row"><span class="label">Turnout</span><span class="value">'+(props.turnout_2022||'—')+'%</span></div>'
    + '<div class="row"><span class="label">Majority</span><span class="value">'+(props.majority_2022||'—')+'</span></div></div>';
}

function render(year) {
  if (!PARLIMEN_GEOJSON) return;
  currentYear = year;
  if (geoLayer) map.removeLayer(geoLayer);
  if (legendCtrl) map.removeControl(legendCtrl);

  geoLayer = L.geoJSON(PARLIMEN_GEOJSON, {
    style: mkStyle(year),
    onEachFeature: (f, l) => {
      l.on({ mouseover: highlight, mouseout: unhighlight });
      l.bindPopup(popupHTML(f.properties), { maxWidth: 350 });
    },
  }).addTo(map);

  // Stats bar - top 3 parties
  const tally = {};
  PARLIMEN_GEOJSON.features.forEach(f => {
    const p = f.properties[ELECTION[year].party] || 'Unknown';
    tally[p] = (tally[p]||0) + 1;
  });
  const sorted = Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  document.getElementById('stats').textContent = sorted.slice(0,3).map(([p,c])=>p+': '+c).join(' · ');

  // Source annotation
  const srcProp = ELECTION[year].source;
  const srcText = PARLIMEN_GEOJSON.features[0].properties[srcProp] || '';
  const srcClass = srcText.includes('Primary') ? 'primary' : 'secondary';
  document.getElementById('source-anno').innerHTML =
    'Data: <span class="'+srcClass+'">' + srcText + '</span>';

  legendCtrl = L.control({ position: 'bottomright' });
  legendCtrl.onAdd = () => { const d = L.DomUtil.create('div', 'legend'); d.innerHTML = updateLegend(year); return d; };
  legendCtrl.addTo(map);
}

let PARLIMEN_GEOJSON = null;

// Load GeoJSON from separate file
fetch('boundaries.geojson')
  .then(r => r.json())
  .then(data => {
    PARLIMEN_GEOJSON = data;
    document.getElementById('loading').style.display = 'none';
    render('2022');
  })
  .catch(err => {
    document.getElementById('loading').textContent = 'Error loading map data: ' + err.message;
  });

document.getElementById('electionToggle').addEventListener('change', function() { render(this.value); });
</script>
</body>
</html>
